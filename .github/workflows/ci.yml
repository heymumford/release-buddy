name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege by default.
permissions:
  contents: read

# Supersede in-flight runs for the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]
    steps:
      - uses: actions/checkout@v7
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test

  security:
    runs-on: ubuntu-latest
    # contents: read only — no npm install runs here, so untrusted PR code is
    # never executed, and no write scope is exposed to a third-party action.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history for the secret scan
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
      # npm audit reads package-lock.json directly — no `npm ci`, so this job
      # never runs a PR's dependency lifecycle scripts.
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: 'false'
          GITLEAKS_ENABLE_COMMENTS: 'false' # uniform behavior on fork + internal PRs
