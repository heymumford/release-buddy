sonar.projectKey=heymumford_release-buddy
sonar.organization=heymumford
sonar.projectName=release-buddy

# Source vs test layout
sonar.sources=index.js,src
sonar.tests=test
sonar.test.inclusions=test/**/*.test.js

# Coverage — lcov emitted by `npm run test:coverage` (vitest v8 provider)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclusions
sonar.exclusions=node_modules/**,coverage/**,docs/**,test/**,**/*.config.js

sonar.sourceEncoding=UTF-8
